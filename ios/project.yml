name: InterviewPrep
options:
  bundleIdPrefix: com.can4hou6joeng4.interviewprep
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  InterviewPrep:
    type: application
    platform: iOS
    sources:
      - path: InterviewPrep
    resources:
      - path: InterviewPrep/Resources
    info:
      path: InterviewPrep/Info.plist
      properties:
        CFBundleDisplayName: 面经刷题
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.can4hou6joeng4.interviewprep
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
