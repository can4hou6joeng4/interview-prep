<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fffdf7">
<title>Page Not Found · Go Backend Interview Prep</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="site.webmanifest">
<link rel="stylesheet" href="assets/styles.css">
<style>
body{display:grid;place-items:center;padding:24px}
.nf{
	max-width:620px;padding:32px 28px 28px;border-radius:0;text-align:center;
	background:var(--surface);
	border:3px solid var(--border);box-shadow:6px 6px 0 var(--border);
}
.nf h1{font-size:56px;line-height:1;margin-bottom:14px;font-weight:900;color:var(--text);display:inline-block;background:var(--yellow);padding:6px 24px;border:3px solid var(--border);box-shadow:4px 4px 0 var(--border);transform:rotate(-2deg)}
.nf h2{font-size:22px;margin-bottom:10px;font-weight:900}
.nf p{color:var(--text2);margin-bottom:18px;font-weight:600}
.nf a{display:inline-flex;align-items:center;justify-content:center;padding:12px 22px;border-radius:0;background:var(--pink);color:#fff;font-weight:900;text-decoration:none;border:3px solid var(--border);box-shadow:4px 4px 0 var(--border);transition:all .15s;text-transform:uppercase}
.nf a:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--border)}
.nf a:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--border)}
</style>
</head>
<body>
<main class="nf">
	<h1>404</h1>
	<h2>Page Not Found</h2>
	<p>The page you requested does not exist or has been moved. Return to the interview prep home page and continue reviewing.</p>
	<a href="./">Back To Home</a>
</main>
</body>
</html>
