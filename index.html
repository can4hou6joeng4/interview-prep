<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go 后端面试题库 — 基于简历定制</title>
<style>
:root {
	--bg: #0f1117;
	--card: #1a1d27;
	--card-hover: #222633;
	--border: #2a2e3d;
	--accent: #6c8cff;
	--accent-dim: rgba(108,140,255,0.12);
	--green: #34d399;
	--green-dim: rgba(52,211,153,0.12);
	--orange: #fb923c;
	--orange-dim: rgba(251,146,60,0.12);
	--red: #f87171;
	--red-dim: rgba(248,113,113,0.12);
	--purple: #a78bfa;
	--purple-dim: rgba(167,139,250,0.12);
	--cyan: #22d3ee;
	--cyan-dim: rgba(34,211,238,0.12);
	--text: #e2e8f0;
	--text-dim: #94a3b8;
	--text-muted: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
	font-family: -apple-system, 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
	background: var(--bg);
	color: var(--text);
	line-height: 1.7;
	min-height: 100vh;
}
.container { max-width: 960px; margin: 0 auto; padding: 24px 20px 80px; }

/* Header */
.header {
	text-align: center;
	padding: 48px 0 32px;
	border-bottom: 1px solid var(--border);
	margin-bottom: 32px;
}
.header h1 {
	font-size: 28px;
	font-weight: 700;
	background: linear-gradient(135deg, var(--accent), var(--cyan));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	margin-bottom: 8px;
}
.header p { color: var(--text-dim); font-size: 14px; }

/* Stats Bar */
.stats-bar {
	display: flex;
	gap: 12px;
	margin-bottom: 28px;
	flex-wrap: wrap;
}
.stat-card {
	flex: 1;
	min-width: 120px;
	background: var(--card);
	border: 1px solid var(--border);
	border-radius: 10px;
	padding: 16px;
	text-align: center;
	transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--accent); }
.stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* Controls */
.controls {
	display: flex;
	gap: 10px;
	margin-bottom: 24px;
	flex-wrap: wrap;
	align-items: center;
}
.search-box {
	flex: 1;
	min-width: 200px;
	padding: 10px 16px;
	background: var(--card);
	border: 1px solid var(--border);
	border-radius: 8px;
	color: var(--text);
	font-size: 14px;
	outline: none;
	transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-muted); }

.filter-btn {
	padding: 8px 16px;
	border-radius: 20px;
	border: 1px solid var(--border);
	background: var(--card);
	color: var(--text-dim);
	font-size: 13px;
	cursor: pointer;
	transition: all 0.2s;
	white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active {
	background: var(--accent-dim);
	border-color: var(--accent);
	color: var(--accent);
}
.diff-btn { font-size: 12px; padding: 6px 12px; }
.diff-btn[data-diff="easy"] { --fc: var(--green); }
.diff-btn[data-diff="medium"] { --fc: var(--orange); }
.diff-btn[data-diff="hard"] { --fc: var(--red); }
.diff-btn.active { background: color-mix(in srgb, var(--fc) 15%, transparent); border-color: var(--fc); color: var(--fc); }

/* Category Section */
.category {
	margin-bottom: 32px;
}
.category-header {
	display: flex;
	align-items: center;
	gap: 10px;
	margin-bottom: 14px;
	cursor: pointer;
	user-select: none;
}
.category-icon {
	width: 36px; height: 36px;
	border-radius: 8px;
	display: flex; align-items: center; justify-content: center;
	font-size: 18px;
	flex-shrink: 0;
}
.category-title {
	font-size: 18px;
	font-weight: 600;
	flex: 1;
}
.category-count {
	font-size: 12px;
	color: var(--text-muted);
	background: var(--card);
	padding: 2px 10px;
	border-radius: 10px;
}
.category-toggle {
	color: var(--text-muted);
	font-size: 12px;
	transition: transform 0.3s;
}
.category-toggle.collapsed { transform: rotate(-90deg); }

/* Question Card */
.qa-list { display: flex; flex-direction: column; gap: 8px; }
.qa-card {
	background: var(--card);
	border: 1px solid var(--border);
	border-radius: 10px;
	overflow: hidden;
	transition: border-color 0.2s, background 0.2s;
}
.qa-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
.qa-card.mastered { opacity: 0.5; }
.qa-card.mastered .qa-question::before {
	content: '';
	position: absolute;
	left: 0; right: 0; top: 50%;
	height: 1px;
	background: var(--text-muted);
}

.qa-question {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 14px 16px;
	cursor: pointer;
	user-select: none;
	position: relative;
}
.qa-num {
	font-size: 12px;
	color: var(--text-muted);
	font-weight: 600;
	min-width: 18px;
}
.qa-text {
	flex: 1;
	font-size: 14px;
	font-weight: 500;
}
.qa-tags { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.qa-tag {
	font-size: 11px;
	padding: 2px 8px;
	border-radius: 4px;
	font-weight: 500;
}
.tag-easy { background: var(--green-dim); color: var(--green); }
.tag-medium { background: var(--orange-dim); color: var(--orange); }
.tag-hard { background: var(--red-dim); color: var(--red); }
.tag-project { background: var(--purple-dim); color: var(--purple); font-size: 10px; }
.tag-scene { background: var(--cyan-dim); color: var(--cyan); font-size: 10px; }

.qa-check {
	width: 20px; height: 20px;
	border-radius: 50%;
	border: 2px solid var(--border);
	display: flex; align-items: center; justify-content: center;
	cursor: pointer;
	transition: all 0.2s;
	flex-shrink: 0;
	font-size: 12px;
	color: transparent;
}
.qa-check:hover { border-color: var(--green); }
.qa-check.checked {
	border-color: var(--green);
	background: var(--green);
	color: #fff;
}

.qa-answer {
	display: none;
	padding: 0 16px 16px;
	border-top: 1px solid var(--border);
}
.qa-answer.open { display: block; padding-top: 14px; }
.qa-answer h4 {
	font-size: 13px;
	color: var(--accent);
	margin: 16px 0 6px;
	font-weight: 600;
}
.qa-answer h4:first-child { margin-top: 0; }
.qa-answer p, .qa-answer li {
	font-size: 13.5px;
	color: var(--text-dim);
	line-height: 1.8;
}
.qa-answer ul { padding-left: 18px; }
.qa-answer li { margin-bottom: 4px; }
.qa-answer code {
	background: rgba(108,140,255,0.1);
	color: var(--accent);
	padding: 1px 6px;
	border-radius: 4px;
	font-size: 12.5px;
	font-family: 'JetBrains Mono', 'Fira Code', monospace;
}
.qa-answer pre {
	background: #151821;
	border: 1px solid var(--border);
	border-radius: 8px;
	padding: 14px;
	margin: 10px 0;
	overflow-x: auto;
	font-size: 12.5px;
	line-height: 1.6;
}
.qa-answer pre code {
	background: none;
	padding: 0;
	color: var(--text-dim);
}
.qa-answer .key-point {
	background: var(--accent-dim);
	border-left: 3px solid var(--accent);
	padding: 10px 14px;
	border-radius: 0 6px 6px 0;
	margin: 10px 0;
	font-size: 13px;
	color: var(--text);
}
.qa-answer .project-link {
	background: var(--purple-dim);
	border-left: 3px solid var(--purple);
	padding: 10px 14px;
	border-radius: 0 6px 6px 0;
	margin: 10px 0;
	font-size: 13px;
	color: var(--purple);
}

/* Progress Bar */
.progress-wrap {
	position: fixed;
	bottom: 0;
	left: 0; right: 0;
	background: var(--card);
	border-top: 1px solid var(--border);
	padding: 12px 24px;
	display: flex;
	align-items: center;
	gap: 16px;
	z-index: 100;
}
.progress-bar {
	flex: 1;
	height: 6px;
	background: var(--border);
	border-radius: 3px;
	overflow: hidden;
}
.progress-fill {
	height: 100%;
	background: linear-gradient(90deg, var(--accent), var(--green));
	border-radius: 3px;
	transition: width 0.4s ease;
	width: 0%;
}
.progress-text { font-size: 13px; color: var(--text-dim); white-space: nowrap; }

/* Responsive */
@media (max-width: 640px) {
	.container { padding: 16px 14px 80px; }
	.header { padding: 32px 0 24px; }
	.header h1 { font-size: 22px; }
	.stats-bar { gap: 8px; }
	.stat-card { padding: 12px; }
	.stat-num { font-size: 22px; }
	.qa-tags { display: none; }
	.controls { gap: 6px; }
}

/* Expand / Collapse All */
.toolbar {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
	margin-bottom: 18px;
}
.tool-btn {
	padding: 6px 14px;
	border-radius: 6px;
	border: 1px solid var(--border);
	background: var(--card);
	color: var(--text-dim);
	font-size: 12px;
	cursor: pointer;
	transition: all 0.2s;
}
.tool-btn:hover { border-color: var(--accent); color: var(--text); }

.hidden { display: none !important; }
</style>
</head>

		<p>基于简历项目定制 | 覆盖八股文 + 项目场景题 + 系统设计</p>

			diff: "easy",
			tags: [],
			a: `<h4>核心概念</h4>
<ul>
<li><b>G (Goroutine)</b>：用户态轻量级线程，初始栈 2KB（可动态增长到 1GB），包含执行栈、状态、任务函数等信息</li>
<li><b>M (Machine)</b>：操作系统线程，由 OS 管理调度，Go 运行时最多创建 10000 个 M</li>
<li><b>P (Processor)</b>：逻辑处理器，数量默认等于 <code>GOMAXPROCS</code>（通常为 CPU 核心数），持有本地运行队列（最多 256 个 G）</li>
</ul>
<h4>调度流程</h4>
<ul>
<li>每个 P 维护一个本地队列，新创建的 G 优先放入当前 P 的本地队列</li>
<li>M 必须绑定一个 P 才能执行 G，M 从绑定的 P 的本地队列取 G 执行</li>
<li>本地队列为空时，M 会尝试从全局队列或其他 P 的队列<b>窃取 (work stealing)</b> G</li>
<li>当 G 发生系统调用阻塞时，M 会与 P 解绑，P 转移给空闲 M 或新建 M 继续执行其他 G</li>
</ul>
<div class="key-point">面试加分：提到 work stealing 机制、hand off 机制（阻塞时 P 与 M 解绑）、抢占式调度（Go 1.14 基于信号的异步抢占）</div>`

			tags: [],
			a: `<h4>底层结构 (runtime.hchan)</h4>
<pre><code>type hchan struct {
    qcount   uint      // 当前队列中的元素数量
    dataqsiz uint      // 环形缓冲区大小（即 cap）
    buf      unsafe.Pointer // 环形缓冲区指针
    elemsize uint16    // 元素大小
    closed   uint32    // 是否关闭
    sendx    uint      // 发送索引
    recvx    uint      // 接收索引
    recvq    waitq     // 等待接收的 goroutine 队列
    sendq    waitq     // 等待发送的 goroutine 队列
    lock     mutex     // 互斥锁
}</code></pre>
<h4>无缓冲 vs 有缓冲</h4>
<ul>
<li><b>无缓冲</b> (<code>make(chan T)</code>)：发送和接收必须同时就绪，否则阻塞。本质是同步通信</li>
<li><b>有缓冲</b> (<code>make(chan T, n)</code>)：缓冲区未满时发送不阻塞，缓冲区为空时接收阻塞。本质是异步通信</li>
</ul>
<h4>关键行为</h4>
<ul>
<li>向 nil channel 发送/接收会永久阻塞</li>
<li>向已关闭的 channel 发送会 panic</li>
<li>从已关闭的 channel 接收会返回零值（可通过 <code>v, ok := <-ch</code> 判断）</li>
</ul>`

			q: "Go 的 interface 底层是如何实现的？空接口和非空接口有什么区别？",

			tags: [],
			a: `<h4>两种底层结构</h4>
<p><b>空接口</b> <code>interface{}</code> 对应 <code>runtime.eface</code>：</p>
<pre><code>type eface struct {
    _type *_type         // 指向类型元数据
    data  unsafe.Pointer // 指向实际数据
}</code></pre>
<p><b>非空接口</b>对应 <code>runtime.iface</code>：</p>
<pre><code>type iface struct {
    tab  *itab           // 类型信息 + 方法表
    data unsafe.Pointer  // 指向实际数据
}</code></pre>
<h4>itab 结构</h4>
<pre><code>type itab struct {
    inter *interfacetype // 接口类型
    _type *_type         // 实际类型
    hash  uint32         // 类型哈希，用于快速判断
    fun   [1]uintptr     // 方法表（变长数组）
}</code></pre>
<h4>关键点</h4>
<ul>
<li>itab 会被缓存到全局的 <code>itabTable</code> 哈希表中，同一对 (接口类型, 实际类型) 只计算一次</li>
<li>接口赋值时，如果值类型小于等于指针大小，直接存在 data 字段；否则堆上分配后存指针</li>
<li>类型断言 <code>v.(T)</code> 的本质是比较 itab 中的 <code>_type</code> 是否匹配</li>
</ul>
<div class="key-point">面试陷阱：<code>var p *int = nil; var i interface{} = p</code> 此时 <code>i != nil</code>，因为 iface 的 tab 不为 nil（存了 *int 的类型信息）</div>`

</ul>

    data := redis.HGetAll(key)
    for i := 0; i < t.NumField(); i++ {
        tag := t.Field(i).Tag.Get("redis")
        if val, ok := data[tag]; ok {
            // 根据 field.Kind() 做类型转换后 Set
            v.Field(i).Set(convertedValue)
        }
    }
}</code></pre>
<div class="project-link">简历关联：go-cache 基于适配器模式实现统一缓存接口，利用 reflect 库实现 Redis Hash 与 Go Struct 自动映射</div>
<div class="key-point">注意性能：reflect 操作比直接访问慢约 50-100 倍。生产中可通过缓存 TypeOf 结果、代码生成（go generate）等方式优化</div>`
		},
		{
			q: "Go 的 defer 执行顺序是什么？defer 与 panic/recover 的配合机制？",
			diff: "easy",
			tags: [],
			a: `<h4>执行规则</h4>
<ul>
<li><b>LIFO（后进先出）</b>：多个 defer 按栈顺序逆序执行</li>
<li>defer 的参数在 <b>注册时求值</b>，而非执行时</li>
<li>defer 在 <code>return</code> 之后、函数真正返回之前执行（可修改命名返回值）</li>
</ul>
<h4>panic/recover 机制</h4>
<pre><code>func safeCall() (err error) {
    defer func() {
        if r := recover(); r != nil {
            err = fmt.Errorf("panic recovered: %v", r)
            // 记录堆栈: debug.Stack()
        }
    }()
    riskyOperation()
    return nil
}</code></pre>
<ul>
<li><code>panic</code> 触发后，当前函数停止执行，按 LIFO 执行已注册的 defer</li>
<li><code>recover</code> 只能在 defer 函数中生效，捕获 panic 值并恢复正常流程</li>
<li>recover 后函数返回零值（除非使用命名返回值在 defer 中赋值）</li>
</ul>
<div class="key-point">经典陷阱：<code>defer f.Close()</code> 如果 f 为 nil 会 panic。应先判断 err 再 defer</div>`
		},
		{
			q: "Go 的 GC 机制是怎样的？三色标记法的流程？STW 何时发生？",
			diff: "medium",
			tags: [],
			a: `<h4>三色标记法</h4>
<ul>
<li><b>白色</b>：未被访问的对象（GC 结束后被回收）</li>
<li><b>灰色</b>：已被访问但其引用的对象尚未全部扫描</li>
<li><b>黑色</b>：已被访问且其引用的对象全部扫描完毕</li>
</ul>
<h4>流程</h4>
<ol>
<li><b>Mark Setup (STW)</b>：开启写屏障，极短暂（通常 < 100μs）</li>
<li><b>Marking（并发）</b>：从根对象出发，遍历引用图。GC goroutine 与用户 goroutine 并发执行</li>
<li><b>Mark Termination (STW)</b>：关闭写屏障，完成最终标记，极短暂</li>
<li><b>Sweeping（并发）</b>：回收白色对象的内存</li>

type EventListener interface {
    Handle(ctx context.Context, event Event) error

type EventBus struct {
    mu        sync.RWMutex
    listeners map[EventType][]EventListener
}

func (eb *EventBus) On(eventType EventType, listener EventListener) {
    eb.mu.Lock()
    defer eb.mu.Unlock()
    eb.listeners[eventType] = append(eb.listeners[eventType], listener)

func (eb *EventBus) Emit(ctx context.Context, eventType EventType, payload interface{}) error {
    eb.mu.RLock()
    ls := eb.listeners[eventType]

            return err // Before 事件失败可中断流程
        }
    }
    return nil

<pre><code>type WAL struct {
    file   *os.File
    mu     sync.Mutex
    offset int64

func (w *WAL) Write(op Operation) error {
    w.mu.Lock()
    defer w.mu.Unlock()
    // 1. 序列化操作（type + docId + data + checksum）
    entry := encodeEntry(op)
    // 2. 写入日志文件（顺序追加，高性能）
    _, err := w.file.Write(entry)
    // 3. fsync 确保持久化
    return w.file.Sync()
}

// 崩溃恢复
func (w *WAL) Recover(index *bluge.Writer) error {
    entries := w.ReadAll()
    for _, entry := range entries {

        switch entry.Type {
        case OpIndex:  index.Update(entry.Doc)

    return w.Truncate() // 恢复完毕，截断日志

    unregister  chan *Connection
    broadcast   chan Message

    capacity int
    mu       sync.Mutex
    list     *list.List                    // 双向链表（最近使用 → 最久未用）
    cache    map[string]*list.Element      // key → 链表节点
}

type entry struct {
    key   string
    value interface{}
}

func NewLRUCache(cap int) *LRUCache {
    return &LRUCache{
        capacity: cap,
        list:     list.New(),
        cache:    make(map[string]*list.Element),
    }
}

func (c *LRUCache) Get(key string) (interface{}, bool) {
    c.mu.Lock()
    defer c.mu.Unlock()
    if elem, ok := c.cache[key]; ok {
        c.list.MoveToFront(elem)  // 移到链表头部
        return elem.Value.(*entry).value, true
    }
    return nil, false
}

func (c *LRUCache) Put(key string, value interface{}) {
    c.mu.Lock()
    defer c.mu.Unlock()
    if elem, ok := c.cache[key]; ok {
        c.list.MoveToFront(elem)
        elem.Value.(*entry).value = value
        return
    }
    if c.list.Len() >= c.capacity {
        // 淘汰链表尾部（最久未使用）
        tail := c.list.Back()
        c.list.Remove(tail)
        delete(c.cache, tail.Value.(*entry).key)
    }
    elem := c.list.PushFront(&entry{key, value})
    c.cache[key] = elem
}</code></pre>

                wp.wg.Done()
            }

    wg  sync.WaitGroup
    val interface{}
    err error

type SingleFlight struct {
    mu sync.Mutex
    m  map[string]*call
}

func (sf *SingleFlight) Do(key string, fn func() (interface{}, error)) (interface{}, error) {
    sf.mu.Lock()
    if sf.m == nil {
        sf.m = make(map[string]*call)
    }

    // 如果已有相同 key 的请求在执行，等待结果
    if c, ok := sf.m[key]; ok {
        sf.mu.Unlock()
        c.wg.Wait()           // 等待第一个请求完成
        return c.val, c.err   // 共享结果
    }

    // 第一个请求，创建 call 并执行
    c := &call{}
    c.wg.Add(1)
    sf.m[key] = c
    sf.mu.Unlock()

    c.val, c.err = fn()  // 实际执行
    c.wg.Done()           // 唤醒等待者

    sf.mu.Lock()
    delete(sf.m, key)     // 清理
    sf.mu.Unlock()

    return c.val, c.err
}

// 使用场景：缓存击穿防护

			a: `<h4>三次握手</h4>
<pre><code>客户端         服务端
  |--- SYN (seq=x) --->|     ① 客户端发起连接
  |<-- SYN+ACK (seq=y, ack=x+1) --|  ② 服务端确认并发起
  |--- ACK (ack=y+1) -->|     ③ 客户端确认</code></pre>
<p><b>为什么三次</b>：防止历史连接请求（旧 SYN）造成误连。两次的话服务端无法确认客户端是否收到 SYN+ACK</p>

<h4>四次挥手</h4>
<pre><code>主动方         被动方
  |--- FIN --->|    ① 我要关闭发送
  |<-- ACK ----|    ② 知道了（但我可能还有数据要发）
  |<-- FIN ----|    ③ 我也发完了，关闭
  |--- ACK --->|    ④ 收到，连接关闭</code></pre>
<p><b>为什么四次</b>：TCP 全双工，每个方向需要独立关闭。被动方收到 FIN 时可能还有数据没发完，所以 ACK 和 FIN 分两步</p>

<h4>TIME_WAIT</h4>
<ul>
<li>主动关闭方进入 TIME_WAIT，等待 2MSL（通常 60 秒）</li>
<li>原因：(1) 确保最后的 ACK 到达对方 (2) 让旧连接的迟到报文在网络中消亡</li>
<li>服务端大量 TIME_WAIT 解决：<code>tcp_tw_reuse</code>、连接池复用</li>
</ul>`

}

// 读取

    io.ReadFull(conn, header)

<p>服务 A 调用服务 B，B 响应慢 → A 的线程/goroutine 被占满 → A 也变慢 → 调用 A 的 C 也受影响 → 雪崩</p>
<h4>三板斧</h4>
<ul>
<li><b>限流 (Rate Limiting)</b>：入口处控制流量，超过阈值直接拒绝。防止过载</li>

<li><b>降级 (Fallback)</b>：熔断后返回兜底数据（缓存数据/默认值），而非直接报错</li>
</ul>
<pre><code>// Go 熔断器（简化版）
type CircuitBreaker struct {
    failures    int
    threshold   int       // 连续失败 N 次后熔断
    state       string    // closed / open / half-open
    lastFailure time.Time
    cooldown    time.Duration
}

func (cb *CircuitBreaker) Call(fn func() error) error {
    if cb.state == "open" {
        if time.Since(cb.lastFailure) > cb.cooldown {
            cb.state = "half-open" // 试探一次
        } else {
            return ErrCircuitOpen // 快速失败
        }
    }
    err := fn()
    if err != nil {
        cb.failures++
        cb.lastFailure = time.Now()
        if cb.failures >= cb.threshold { cb.state = "open" }
        return err
    }
    cb.failures = 0
    cb.state = "closed"
    return nil
}</code></pre>

// ========== Render & Interaction ==========
let mastered = JSON.parse(localStorage.getItem('mastered') || '{}');
let globalQNum = 0;

function render(filterDiff = 'all', searchText = '') {
	const container = document.getElementById('content');
	container.innerHTML = '';
	globalQNum = 0;
	let totalQ = 0, masteredQ = 0;

	DATA.forEach((cat, ci) => {
		const section = document.createElement('div');
		section.className = 'category';
		section.dataset.cat = ci;

		let visibleItems = cat.items.filter(item => {
			const diffMatch = filterDiff === 'all' || item.diff === filterDiff;
			const textMatch = !searchText || item.q.toLowerCase().includes(searchText) ||
				item.a.toLowerCase().includes(searchText);
			return diffMatch && textMatch;
		});

		if (visibleItems.length === 0) return;

		section.innerHTML = `
			<div class="category-header" onclick="toggleCategory(${ci})">
				<div class="category-icon" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
				<div class="category-title" style="color:${cat.color}">${cat.cat}</div>
				<div class="category-count">${visibleItems.length} 题</div>
				<div class="category-toggle" id="toggle-${ci}">▼</div>
			</div>
			<div class="qa-list" id="list-${ci}"></div>
		`;
		container.appendChild(section);

		const list = section.querySelector('.qa-list');
		visibleItems.forEach((item, idx) => {
			globalQNum++;
			const qid = `${ci}-${idx}`;
			const isMastered = mastered[qid];
			totalQ++;
			if (isMastered) masteredQ++;

			const diffLabel = {easy:'基础',medium:'进阶',hard:'深入'}[item.diff];
			const tagHtml = item.tags.map(t => {
				if (t === 'project') return '<span class="qa-tag tag-project">简历项目</span>';
				if (t === 'scene') return '<span class="qa-tag tag-scene">场景题</span>';
				return '';
			}).join('');

			const card = document.createElement('div');
			card.className = 'qa-card' + (isMastered ? ' mastered' : '');
			card.id = `card-${qid}`;
			card.innerHTML = `
				<div class="qa-question" onclick="toggleAnswer('${qid}')">
					<span class="qa-num">${globalQNum}</span>
					<span class="qa-text">${item.q}</span>
					<div class="qa-tags">
						${tagHtml}
						<span class="qa-tag tag-${item.diff}">${diffLabel}</span>
					</div>
					<div class="qa-check ${isMastered?'checked':''}" onclick="event.stopPropagation();toggleMastered('${qid}')" title="标记已掌握">${isMastered?'✓':''}</div>
				</div>
				<div class="qa-answer" id="ans-${qid}">${item.a}</div>
			`;
			list.appendChild(card);
		});
	});

	updateStats(totalQ, masteredQ);
}

function toggleAnswer(qid) {
	const ans = document.getElementById('ans-' + qid);
	ans.classList.toggle('open');
}

function toggleCategory(ci) {
	const list = document.getElementById('list-' + ci);
	const toggle = document.getElementById('toggle-' + ci);
	list.classList.toggle('hidden');
	toggle.classList.toggle('collapsed');
}

function toggleMastered(qid) {
	mastered[qid] = !mastered[qid];
	if (!mastered[qid]) delete mastered[qid];
	localStorage.setItem('mastered', JSON.stringify(mastered));
	const card = document.getElementById('card-' + qid);
	const check = card.querySelector('.qa-check');
	card.classList.toggle('mastered');
	check.classList.toggle('checked');
	check.textContent = check.classList.contains('checked') ? '✓' : '';
	recountStats();
}

function updateStats(total, done) {
	document.getElementById('totalCount').textContent = total;
	document.getElementById('masteredCount').textContent = done;
	document.getElementById('remainCount').textContent = total - done;
	const pct = total > 0 ? Math.round(done / total * 100) : 0;
	document.getElementById('progressPct').textContent = pct + '%';
	document.getElementById('progressFill').style.width = pct + '%';
	document.getElementById('progressLabel').textContent = `已掌握 ${done} / ${total}`;
}

function recountStats() {
	const cards = document.querySelectorAll('.qa-card');
	let total = cards.length, done = 0;
	cards.forEach(c => { if (c.classList.contains('mastered')) done++; });
	updateStats(total, done);
}

function expandAll() {
	document.querySelectorAll('.qa-answer').forEach(a => a.classList.add('open'));
	document.querySelectorAll('.qa-list').forEach(l => l.classList.remove('hidden'));
	document.querySelectorAll('.category-toggle').forEach(t => t.classList.remove('collapsed'));
}
function collapseAll() {
	document.querySelectorAll('.qa-answer').forEach(a => a.classList.remove('open'));
}
function resetProgress() {
	if (!confirm('确定重置所有进度？')) return;
	mastered = {};
	localStorage.removeItem('mastered');
	render(currentDiff, currentSearch);
}

let currentDiff = 'all', currentSearch = '';

document.querySelectorAll('.filter-btn[data-diff]').forEach(btn => {
	btn.addEventListener('click', () => {
		const isActive = btn.classList.contains('active');
		document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
		if (!isActive) {
			btn.classList.add('active');
			currentDiff = btn.dataset.diff;
			document.querySelector('[data-cat="all"]').classList.remove('active');
		} else {
			currentDiff = 'all';
			document.querySelector('[data-cat="all"]').classList.add('active');
		}
		render(currentDiff, currentSearch);
	});
});

document.querySelector('[data-cat="all"]').addEventListener('click', () => {
	document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
	document.querySelector('[data-cat="all"]').classList.add('active');
	currentDiff = 'all';
	render(currentDiff, currentSearch);
});

document.getElementById('searchInput').addEventListener('input', (e) => {
	currentSearch = e.target.value.toLowerCase();
	render(currentDiff, currentSearch);
});

render();
</script>
