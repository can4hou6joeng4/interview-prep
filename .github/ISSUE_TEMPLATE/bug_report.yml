name: Bug report
description: 反馈页面异常、发布问题或题库渲染错误
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题
      placeholder: 例如：列表模式下筛选“未掌握”后，勾选掌握状态没有立即消失
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序描述如何复现
      placeholder: |
        1. 打开页面
        2. 切换到列表模式
        3. 输入关键字 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 浏览器、系统、是否为 GitHub Pages 页面
